<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ACE-Step UI - Local AI Music Generator</title>

    <!-- Primary Meta Tags -->
    <meta name="title" content="ACE-Step UI - Local AI Music Generator" />
    <meta name="description" content="Create AI music locally with ACE-Step UI. Free and open source music generation powered by ACE-Step 1.5." />
    <meta name="keywords" content="AI music generator, ACE-Step, local AI, music generation, text to music, AI song generator" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="ACE-Step UI" />

    <!-- Additional SEO -->
    <meta name="theme-color" content="#00C2FF" />
    <meta name="application-name" content="ACE-Step UI" />
    <meta name="apple-mobile-web-app-title" content="ACE-Step UI" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              suno: {
                DEFAULT: '#0A0B0D',
                sidebar: '#060709',
                panel: '#14151C',
                card: '#1a1b23',
                hover: '#1e2030',
                border: '#27272a',
              },
              accent: {
                DEFAULT: '#00C2FF',
                50: '#e6f9ff',
                100: '#b3efff',
                200: '#80e4ff',
                300: '#4dd9ff',
                400: '#1aceff',
                500: '#00C2FF',
                600: '#009bcc',
                700: '#007599',
                800: '#004e66',
                900: '#002833',
              },
              strands: {
                pink: '#F000B8',
                yellow: '#F9E100',
                purple: '#8b5cf6',
                red: '#FF4444',
                green: '#22c55e',
              }
            },
            fontFamily: {
              display: ['Orbitron', 'sans-serif'],
              sans: ['Rajdhani', 'Exo 2', 'sans-serif'],
            },
            animation: {
              'gradient-x': 'gradient-x 15s ease infinite',
              'pulse-glow': 'pulseGlow 3s ease-in-out infinite',
            },
            keyframes: {
              'gradient-x': {
                '0%, 100%': {
                  'background-size': '200% 200%',
                  'background-position': 'left center'
                },
                '50%': {
                  'background-size': '200% 200%',
                  'background-position': 'right center'
                },
              },
              'pulseGlow': {
                '0%, 100%': { opacity: '0.3' },
                '50%': { opacity: '0.7' },
              },
            }
          }
        }
      }
    </script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap');

      :root {
        --breakpoint-mobile: 768px;
        --c-accent: #00C2FF;
        --c-pink: #F000B8;
        --c-yellow: #F9E100;
        --c-purple: #8b5cf6;
        --c-bg: #0A0B0D;
        --c-surface: rgba(20, 21, 28, 0.85);
        --c-text: #E2E8F0;
        --c-sub: #A0AEC0;
        --c-border: rgba(255, 255, 255, 0.06);
        --c-glass: rgba(255, 255, 255, 0.08);
      }

      body {
        font-family: 'Rajdhani', 'Exo 2', sans-serif;
      }

      h1, h2, h3, h4, h5, h6, .font-display {
        font-family: 'Orbitron', sans-serif;
      }

      ::-webkit-scrollbar {
        width: 5px;
        height: 5px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(0, 194, 255, 0.2);
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(0, 194, 255, 0.4);
      }

      /* Dark mode scrollbar */
      .dark ::-webkit-scrollbar-thumb {
        background: rgba(0, 194, 255, 0.2);
      }
      .dark ::-webkit-scrollbar-thumb:hover {
        background: rgba(0, 194, 255, 0.4);
      }

      /* Firefox scrollbar */
      * {
        scrollbar-width: thin;
        scrollbar-color: rgba(0, 194, 255, 0.2) transparent;
      }

      /* Selection */
      ::selection {
        background: rgba(0, 194, 255, 0.25);
      }

      /* Hide scrollbar utility */
      .scrollbar-hide {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .scrollbar-hide::-webkit-scrollbar {
        display: none;
      }

      .gradient-text {
        background: linear-gradient(to right, #00C2FF, #8b5cf6, #F000B8);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      @keyframes music-bars {
        0% { height: 20%; opacity: 0.5; }
        50% { height: 100%; opacity: 1; }
        100% { height: 20%; opacity: 0.5; }
      }

      .music-bar-anim {
        animation: music-bars 1s ease-in-out infinite;
      }

      .mobile-only {
        display: none;
      }
      .desktop-only {
        display: block;
      }
      @media (max-width: 767px) {
        .mobile-only {
          display: block;
        }
        .desktop-only {
          display: none;
        }
        .mobile-only-flex {
          display: flex;
        }
        .mobile-only-inline {
          display: inline;
        }
        .mobile-only-inline-flex {
          display: inline-flex;
        }
      }

      @keyframes slide-in-left {
        from { transform: translateX(-100%); }
        to { transform: translateX(0); }
      }
      @keyframes slide-out-left {
        from { transform: translateX(0); }
        to { transform: translateX(-100%); }
      }
      @keyframes slide-in-right {
        from { transform: translateX(100%); }
        to { transform: translateX(0); }
      }
      @keyframes slide-out-right {
        from { transform: translateX(0); }
        to { transform: translateX(100%); }
      }
      @keyframes fade-in {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes fade-out {
        from { opacity: 1; }
        to { opacity: 0; }
      }
      .drawer-slide-in-left {
        animation: slide-in-left 0.3s ease-out forwards;
      }
      .drawer-slide-out-left {
        animation: slide-out-left 0.3s ease-in forwards;
      }
      .drawer-slide-in-right {
        animation: slide-in-right 0.3s ease-out forwards;
      }
      .drawer-slide-out-right {
        animation: slide-out-right 0.3s ease-in forwards;
      }
      .drawer-backdrop-in {
        animation: fade-in 0.3s ease-out forwards;
      }
      .drawer-backdrop-out {
        animation: fade-out 0.3s ease-in forwards;
      }

      .backdrop-blur-mobile {
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
      }
      .backdrop-blur-mobile-lg {
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
      }

      .safe-area-inset-top {
        padding-top: env(safe-area-inset-top, 0px);
      }
      .safe-area-inset-bottom {
        padding-bottom: env(safe-area-inset-bottom, 0px);
      }
      .safe-area-inset-left {
        padding-left: env(safe-area-inset-left, 0px);
      }
      .safe-area-inset-right {
        padding-right: env(safe-area-inset-right, 0px);
      }
      .safe-area-inset-x {
        padding-left: env(safe-area-inset-left, 0px);
        padding-right: env(safe-area-inset-right, 0px);
      }
      .safe-area-inset-y {
        padding-top: env(safe-area-inset-top, 0px);
        padding-bottom: env(safe-area-inset-bottom, 0px);
      }
      .safe-area-inset-all {
        padding-top: env(safe-area-inset-top, 0px);
        padding-bottom: env(safe-area-inset-bottom, 0px);
        padding-left: env(safe-area-inset-left, 0px);
        padding-right: env(safe-area-inset-right, 0px);
      }

      .touch-none {
        -webkit-tap-highlight-color: transparent;
        touch-action: none;
      }
      .touch-pan-x {
        touch-action: pan-x;
      }
      .touch-pan-y {
        touch-action: pan-y;
      }
      .touch-manipulation {
        touch-action: manipulation;
      }
      .tap-highlight-none {
        -webkit-tap-highlight-color: transparent;
      }
      .scroll-touch {
        -webkit-overflow-scrolling: touch;
      }
      .overscroll-none {
        overscroll-behavior: none;
      }
      .overscroll-contain {
        overscroll-behavior: contain;
      }
    </style>

}
</script>
